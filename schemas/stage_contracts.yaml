stages:
  0:
    name: inbox
    readable:
      - project.yaml
      - 00_inbox/**
    writable:
      - project.yaml
      - 00_inbox/idea.md
      - 00_inbox/user_constraints.yaml
    required_outputs:
      - 00_inbox/idea.md
      - 00_inbox/user_constraints.yaml
    gate: null
  1:
    name: intake
    readable:
      - project.yaml
      - 00_inbox/**
    writable:
      - project.yaml
      - 01_intake/research_brief.md
      - 01_intake/clarification_questions.md
      - 01_intake/literature_research_plan.md
      - 01_intake/decision_log.md
    forbidden:
      - 02_literature/**
      - 03_experiment_plan/**
      - 04_execution/**
      - 05_analysis/**
      - 06_figures/**
      - 07_writing/**
      - 08_review/**
      - paper/**
      - experiments/**
      - figures/**
      - tables/**
    required_outputs:
      - 01_intake/research_brief.md
      - 01_intake/clarification_questions.md
      - 01_intake/literature_research_plan.md
      - 01_intake/decision_log.md
    gate: research_direction
  2:
    name: literature
    readable:
      - project.yaml
      - 00_inbox/**
      - 01_intake/**
    writable:
      - project.yaml
      - 02_literature/search_queries.yaml
      - 02_literature/paper_cards.yaml
      - 02_literature/knowledge_pack.md
      - 02_literature/related_work_map.md
      - 02_literature/novelty_gap_analysis.md
      - 02_literature/refined_idea_options.md
      - 02_literature/selected_direction.md
      - paper/references.bib
    forbidden:
      - 03_experiment_plan/**
      - 04_execution/**
      - 05_analysis/**
      - 06_figures/**
      - 07_writing/**
      - 08_review/**
      - paper/main.tex
      - paper/sections/**
      - experiments/**
      - figures/**
      - tables/**
    required_outputs:
      - 02_literature/search_queries.yaml
      - 02_literature/paper_cards.yaml
      - 02_literature/knowledge_pack.md
      - 02_literature/related_work_map.md
      - 02_literature/novelty_gap_analysis.md
      - 02_literature/refined_idea_options.md
      - 02_literature/selected_direction.md
    gate: refined_idea
  3:
    name: experiment_plan
    readable:
      - project.yaml
      - 00_inbox/**
      - 01_intake/**
      - 02_literature/**
    writable:
      - project.yaml
      - 03_experiment_plan/experiment_plan.md
      - 03_experiment_plan/experiment_matrix.yaml
      - 03_experiment_plan/datasets.md
      - 03_experiment_plan/baselines.md
      - 03_experiment_plan/metrics.md
      - 03_experiment_plan/cost_risk.md
      - 03_experiment_plan/approval_request.md
    forbidden:
      - 04_execution/**
      - 05_analysis/**
      - 06_figures/**
      - 07_writing/**
      - 08_review/**
      - experiments/**
      - figures/**
      - tables/**
      - paper/sections/**
    required_outputs:
      - 03_experiment_plan/experiment_plan.md
      - 03_experiment_plan/experiment_matrix.yaml
      - 03_experiment_plan/datasets.md
      - 03_experiment_plan/baselines.md
      - 03_experiment_plan/metrics.md
      - 03_experiment_plan/cost_risk.md
      - 03_experiment_plan/approval_request.md
    gate: experiment_plan
  4:
    name: execution
    readable:
      - project.yaml
      - 03_experiment_plan/**
      - scripts/**
    writable:
      - 04_execution/run_manifest.yaml
      - 04_execution/run_log.md
      - 04_execution/experiment_status.yaml
      - 04_execution/errors.md
      - 04_execution/change_request.md
      - experiments/**
    forbidden:
      - 01_intake/**
      - 02_literature/**
      - 03_experiment_plan/**
      - 05_analysis/**
      - 06_figures/**
      - 07_writing/**
      - 08_review/**
      - paper/**
      - figures/**
      - tables/**
    required_outputs:
      - 04_execution/run_manifest.yaml
      - 04_execution/run_log.md
      - 04_execution/experiment_status.yaml
    gate: null
  5:
    name: analysis
    readable:
      - project.yaml
      - 03_experiment_plan/**
      - 04_execution/**
      - experiments/**
    writable:
      - project.yaml
      - 05_analysis/results_summary.md
      - 05_analysis/finding_cards.yaml
      - 05_analysis/claim_support_matrix.md
      - 05_analysis/statistical_analysis.md
      - 05_analysis/failure_analysis.md
    forbidden:
      - 01_intake/**
      - 02_literature/**
      - 03_experiment_plan/**
      - 04_execution/**
      - experiments/**
      - 06_figures/**
      - 07_writing/**
      - 08_review/**
      - paper/**
      - figures/**
      - tables/**
    required_outputs:
      - 05_analysis/results_summary.md
      - 05_analysis/finding_cards.yaml
      - 05_analysis/claim_support_matrix.md
      - 05_analysis/statistical_analysis.md
      - 05_analysis/failure_analysis.md
    gate: claims
  6:
    name: figures
    readable:
      - project.yaml
      - 05_analysis/**
      - experiments/**
    writable:
      - 06_figures/figure_plan.md
      - 06_figures/captions.md
      - figures/**
      - tables/**
    forbidden:
      - 01_intake/**
      - 02_literature/**
      - 03_experiment_plan/**
      - 04_execution/**
      - 05_analysis/**
      - 07_writing/**
      - 08_review/**
      - paper/**
    required_outputs:
      - 06_figures/figure_plan.md
      - 06_figures/captions.md
    gate: null
  7:
    name: writing
    readable:
      - project.yaml
      - 01_intake/**
      - 02_literature/**
      - 03_experiment_plan/**
      - 05_analysis/**
      - 06_figures/**
      - figures/**
      - tables/**
    writable:
      - 07_writing/narrative_options.md
      - 07_writing/outline.md
      - 07_writing/claim_ledger.md
      - 07_writing/weak_spots.md
      - paper/main.tex
      - paper/references.bib
      - paper/sections/**
    forbidden:
      - 00_inbox/**
      - 01_intake/**
      - 02_literature/**
      - 03_experiment_plan/**
      - 04_execution/**
      - 05_analysis/**
      - 06_figures/**
      - experiments/**
      - figures/**
      - tables/**
      - 08_review/**
    required_outputs:
      - 07_writing/narrative_options.md
      - 07_writing/outline.md
      - 07_writing/claim_ledger.md
      - 07_writing/weak_spots.md
      - paper/main.tex
    gate: null
  8:
    name: review
    readable:
      - project.yaml
      - paper/**
      - 07_writing/**
      - 05_analysis/**
      - 06_figures/**
    writable:
      - 08_review/review_friendly.md
      - 08_review/review_skeptical.md
      - 08_review/review_hostile.md
      - 08_review/meta_review.md
      - 08_review/revision_plan.md
      - 08_review/final_checklist.md
      - 08_review/required_followup_experiments.md
      - paper/main.tex
      - paper/sections/**
      - 07_writing/claim_ledger.md
    forbidden:
      - 00_inbox/**
      - 01_intake/**
      - 02_literature/**
      - 03_experiment_plan/**
      - 04_execution/**
      - 05_analysis/**
      - 06_figures/**
      - experiments/**
      - figures/**
      - tables/**
    required_outputs:
      - 08_review/review_friendly.md
      - 08_review/review_skeptical.md
      - 08_review/review_hostile.md
      - 08_review/meta_review.md
      - 08_review/revision_plan.md
      - 08_review/final_checklist.md
    gate: final_submission
